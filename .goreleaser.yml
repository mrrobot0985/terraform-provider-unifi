version: 2
project_name: terraform-provider-unifi

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - "-s -w -X main.version={{.Version}}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    binary: terraform-provider-unifi
    main: ./main.go

archives:
  - format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

signs:
  - artifacts: checksum
    cmd: 'gpg --armor --detach-sign --output ${signature} ${file}'

changelog:
  disable: true